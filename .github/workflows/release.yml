name: Release

# Tag-driven publish: push a version tag and this publishes to npm.
#   1. bump versions on main (e.g. `pnpm version`) and push
#   2. git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: # allow a manual run from the Actions tab

permissions:
  contents: read
  id-token: write # npm provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      # pnpm publish rewrites `workspace:*` → real ranges, skips private packages
      # (docs) and any version already on the registry.
      - name: Build + publish to npm
        run: pnpm release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
