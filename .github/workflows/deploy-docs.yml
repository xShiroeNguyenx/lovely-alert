name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow GitHub Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let the newest push win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Enable Pages (build_type=workflow) via API so first-time deploys don't
      # need the Settings → Pages toggle flipped manually.
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # astro.config.mjs reads DOCS_SITE / DOCS_BASE so links work under the
      # project Pages subpath (https://<owner>.github.io/<repo>/).
      - name: Build (all packages + docs)
        run: pnpm build
        env:
          DOCS_SITE: https://${{ github.repository_owner }}.github.io
          DOCS_BASE: /${{ github.event.repository.name }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
